<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Šťastný ať je celý vesmír</title>
    <style>
        :root {
            --bg: #09090b;
            --surface: #141416;
            --text: #f4f4f7;
            --text-muted: #71717a;
            --border: #27272a;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 440px;
            width: 100%;
            padding: 40px 20px;
            text-align: center;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }
        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .links-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .card-link {
            background-color: var(--surface);
            color: var(--text);
            text-decoration: none;
            padding: 18px 24px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 1rem;
            transition: background-color 0.15s, border-color 0.15s;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-link:hover {
            background-color: #1e1e22;
            border-color: #3f3f46;
        }
        .card-link span {
            color: var(--text-muted);
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Šťastný ať je celý vesmír</h1>
        <p class="subtitle">Autorská kolekce</p>

        <div class="links-group">
            <!-- ODKAZ NA TISKY -->
            <a href="./tisky/" class="card-link">
                Kolekce fyzických tisků <span>→</span>
            </a>

            <!-- ODKAZ NA NFT (OPENSEA) -->
            <a href="VLOŽTE_ODKAZ_NA_VAŠI_OPENSEA_KOLEKCI" target="_blank" class="card-link">
                Digitální NFT certifikáty (OpenSea) <span>→</span>
            </a>
            
            <!-- PROZATÍMNÍ ODKAZ NA KARTIČKY -->
            <a href="./tisky/" class="card-link">
                Autorské kartičky (150 Kč) <span>→</span>
            </a>
        </div>
    </div>

</body>
</html>
