html<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Šťastný ať je celý vesmír</title>
    <style>
        :root {
            --bg: #0b0b0f;
            --surface: #16161f;
            --text: #f4f4f6;
            --text-muted: #8e8e9f;
            --accent: #ffffff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 480px;
            width: 100%;
            padding: 40px 20px;
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
        }
        .subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 48px;
        }
        .links-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .card-link {
            background-color: var(--surface);
            color: var(--text);
            text-decoration: none;
            padding: 20px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: transform 0.2s, background-color 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-link:hover {
            background-color: #1e1e2b;
            transform: translateY(-2px);
        }
        .card-link span {
            color: var(--text-muted);
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Šťastný ať je celý vesmír</h1>
        <p class="subtitle">Autorská kolekce</p>

        <div class="links-group">
            <!-- ODKAZ NA TISKY -->
            <a href="./tisky/" class="card-link">
                Prohlédnout kolekci tisků <span>→</span>
            </a>

            <!-- ODKAZ NA KARTIČKY (GOOGLE RUN APP) -->
            <a href="https://run.app" target="_blank" class="card-link">
                Podpořit tvorbu & kartičky (150 Kč) <span>→</span>
            </a>
        </div>
    </div>

</body>
</html>
